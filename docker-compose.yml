version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mentara
    ports:
      - "5433:5432"
    volumes:
      - mentara_db_data:/var/lib/postgresql/data

volumes:
  mentara_db_data:
